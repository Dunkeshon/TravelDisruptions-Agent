<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Trailblazer - Your AI travel companion for navigating disruptions and staying on track.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>Trailblazer — Travel AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="chat-header">
            <div class="header-left">
                <button id="menu-btn" class="icon-btn" aria-label="Menu">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="header-center">
                <div class="avatar-status">
                    <div id="header-avatar" class="header-avatar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                            <path d="M2 17l10 5 10-5"></path>
                            <path d="M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <span class="status-dot" id="status-dot"></span>
                </div>
                <div class="header-info">
                    <h1 id="header-title">Trailblazer</h1>
                    <span id="header-status" class="header-subtitle">Online</span>
                </div>
            </div>
            <div class="header-right">
                <button id="new-chat-btn" class="icon-btn" aria-label="New Chat" title="New Chat">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Chat Messages Area -->
        <main id="chat-messages">
            <!-- Welcome Screen -->
            <div id="welcome-screen" class="welcome-screen">
                <div class="welcome-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="url(#welcomeGrad)" stroke-width="1.5">
                        <defs>
                            <linearGradient id="welcomeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#6C63FF"/>
                                <stop offset="100%" stop-color="#48E5C2"/>
                            </linearGradient>
                        </defs>
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <h2>Hey there, traveler! 👋</h2>
                <p>I'm <strong>Trailblazer</strong>, your AI travel companion. Tell me about your trip and I'll help you navigate any disruptions.</p>
                <div class="quick-actions">
                    <button class="quick-chip" data-message="I have a train strike on my route tomorrow. What should I do?">🚂 Train strike</button>
                    <button class="quick-chip" data-message="I'm about to miss my connecting flight. Help!">✈️ Missed connection</button>
                    <button class="quick-chip" data-message="I lost my wallet while traveling abroad. What are my options?">💳 Lost wallet</button>
                    <button class="quick-chip" data-message="Planning a backpacking trip through Southeast Asia. Any risks I should know about?">🎒 Trip planning</button>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer id="chat-input-area">
            <div class="input-wrapper">
                <textarea id="message-input" 
                    placeholder="Message Trailblazer..." 
                    rows="1" 
                    autocomplete="off"
                    autocorrect="on"
                    aria-label="Type your message"></textarea>
                <button id="send-btn" class="send-btn" aria-label="Send message" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </button>
            </div>
            <p class="disclaimer">Trailblazer can make mistakes. Verify critical travel info.</p>
        </footer>

        <!-- Sidebar -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2>Conversations</h2>
                <button id="close-sidebar-btn" class="icon-btn" aria-label="Close sidebar">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="sidebar-section">
                <button id="sidebar-new-chat" class="sidebar-new-chat-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>
            </div>
            <div class="sidebar-section">
                <span class="sidebar-label">Recent</span>
                <ul id="chat-history-list" class="chat-history-list">
                    <!-- Populated by JS -->
                </ul>
            </div>
            <div class="sidebar-footer">
                <div class="sidebar-section">
                    <span class="sidebar-label">Settings</span>
                    <div class="setting-row">
                        <label for="ollama-host-input">Ollama Host</label>
                        <input type="text" id="ollama-host-input" class="setting-input" value="http://localhost:11434" placeholder="http://host:port">
                    </div>
                    <div class="setting-row">
                        <label for="model-select">Model</label>
                        <input type="text" id="model-select" class="setting-input" value="gemma3:4b" placeholder="model name">
                    </div>
                    <button id="save-settings-btn" class="save-settings-btn">Save Settings</button>
                </div>
            </div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
